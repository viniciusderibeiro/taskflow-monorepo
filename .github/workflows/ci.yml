name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: taskflow_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Build and test
        working-directory: backend/api
        env:
          DB_URL: jdbc:postgresql://localhost:5432/taskflow_test
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          JWT_SECRET: ci-secret-key-para-testes-deve-ter-32-chars
          JWT_EXPIRATION: 86400000
        run: mvn verify -B
