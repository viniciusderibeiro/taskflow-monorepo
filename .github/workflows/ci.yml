name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # 1. BACKEND — compila e roda testes com Postgres
  # ─────────────────────────────────────────────
  backend:
    name: Backend — Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: taskflow_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Build and test
        working-directory: backend/api
        env:
          DB_URL: jdbc:postgresql://localhost:5432/taskflow_test
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          JWT_SECRET: ci-secret-key-para-testes-deve-ter-32-chars
          JWT_EXPIRATION: 86400000
        run: mvn verify -B

  # ─────────────────────────────────────────────
  # 2. FRONTEND — lint e type-check em todo push
  # ─────────────────────────────────────────────
  frontend:
    name: Frontend — Lint & Type-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint -w frontend

      - name: Type-check
        run: npx tsc --project frontend/tsconfig.json --noEmit

  # ─────────────────────────────────────────────
  # 3. DEPLOY BACKEND → Railway
  #    Só roda na main E depois dos dois CIs passarem
  # ─────────────────────────────────────────────
  deploy-backend:
    name: Deploy — Backend (Railway)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Railway deploy
        run: curl -fsSL -X POST "${{ secrets.RAILWAY_DEPLOY_HOOK }}"

  # ─────────────────────────────────────────────
  # 4. DEPLOY FRONTEND → Vercel
  #    Só roda na main E depois dos dois CIs passarem
  # ─────────────────────────────────────────────
  deploy-frontend:
    name: Deploy — Frontend (Vercel)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Vercel deploy
        run: curl -fsSL -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
